name: Loomi
options:
  bundleIdPrefix: com.loomi.app
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  LoomiApp:
    type: application
    platform: iOS
    sources:
      - path: LoomiApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loomi.app
        PRODUCT_NAME: Loomi
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: LoomiApp/Info.plist
      properties:
        CFBundleDisplayName: Loomi
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthUpdateUsageDescription: "Loomi logs your breathing sessions as mindful minutes in Apple Health."
        CFBundleURLTypes:
          - CFBundleURLName: com.loomi.app
            CFBundleURLSchemes:
              - loomi
    entitlements:
      path: LoomiApp/LoomiApp.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - target: LoomiWidgetExtension
        embed: true

  LoomiWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: LoomiWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loomi.app.widget
        PRODUCT_NAME: LoomiWidget
    info:
      path: LoomiWidget/Info.plist
      properties:
        CFBundleDisplayName: LoomiWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  Loomi:
    build:
      targets:
        LoomiApp: all
    run:
      config: Debug
      storeKitConfiguration: Loomi.storekit
    archive:
      config: Release
